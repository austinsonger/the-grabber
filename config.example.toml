[[account]]
name        = "Master / Management"
account_id  = "555555555555"
description = "Organization management account"
profile     = "MasterAdmin"
region      = "us-east-1"
output_dir  = "./evidence-output/master"

# Master account gets org-level collectors added on top of global defaults.
[account.collectors]
enable_extra = ["scp", "org-config"]

# ── Per-account collector override examples ───────────────────────────────────

# Exclusive list — ONLY run these collectors for this account:
#
# [[account]]
# name    = "Sandbox"
# profile = "SandboxAdmin"
# region  = "us-west-2"
#
# [account.collectors]
# enable = ["iam-users", "iam-roles", "s3-config", "kms", "vpc"]

# Combine disable + enable_extra for fine-grained per-account control:
#
# [[account]]
# name    = "Security Hub Account"
# profile = "SecurityAdmin"
#
# [account.collectors]
# enable_extra = ["sh-standards", "sh-findings", "macie", "inspector"]
# disable      = ["eks", "ecs", "ecr-config", "elasticache"]
