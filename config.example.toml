# The Grabber — Example Configuration
# Copy to config.toml (project root) or ~/.config/evidence/config.toml and edit for your environment.
#
# The app looks for config in this order:
#   1. ./config.toml           (project-local)
#   2. ~/.config/evidence/config.toml  (user-global)
#
# Each [[account]] block appears in the TUI account picker.
# `profile` must match a [profile NAME] entry in ~/.aws/config.
# Run `aws sso login --profile <name>` before collecting.

# ── Global defaults ──────────────────────────────────────────────────────────

[defaults]
region                 = "us-east-1"
output_dir             = "./evidence-output"
start_date_offset_days = 90      # start date = today minus N days
include_raw            = false

# Collectors disabled by default (opt-in / require special permissions).
[defaults.collectors]
disable = [
    "s3",                 # requires --s3-bucket flag
    "macie",              # optional service — enable if Macie is active
    "inspector",          # optional service — enable if Inspector is active
    "inspector-config",
    "inspector-history",
    "scp",                # requires organization admin role
    "org-config",         # requires organization master account
    "elasticache-global", # most accounts don't use global datastores
]

# ── Accounts ─────────────────────────────────────────────────────────────────
# One [[account]] block per AWS account you want to collect from.
# `profile` must match a [profile NAME] entry in ~/.aws/config.
# Run `aws configure sso` or `aws sso login` to activate SSO profiles.

[[account]]
name        = "Security"
account_id  = "111111111111"
description = "Security workloads"
profile     = "SecurityAdmin"
region      = "us-east-1"
output_dir  = "./evidence-output/security"

# Subtractive list — run defaults minus these collectors:
[account.collectors]
disable = [
    "backup-plans",          # Backup_Plans_Config
    "ct-full-config",        # CloudTrail_Config
    "ct-selectors",          # CloudTrail_EventSelectors
    "cloudtrail-config",     # CloudTrail_Logs
    "ct-validation",         # CloudTrail_LogValidation
    "s3-data-events",        # CloudTrail_S3DataEvents
    "ct-s3-policy",          # CloudTrail_S3Policy
    "config-snapshot",       # Config_Snapshot
    "dynamodb",              # DynamoDB
    "ecr-config",            # ECR_Config
    "ecr-scan",              # ECR_ScanFindings
    "ecs",                   # ECS_Clusters
    "efs",                   # EFS
    "guardduty",             # GuardDuty_Findings
    "guardduty-rules",       # GuardDuty_Suppression
    "iam-certs",             # IAM_Certificates
    "iam-password-policy",   # IAM_Password_Policy
    "metric-filters",        # Log_Metric_Filters_and_Alarms
    "metric-filter-config",  # Metric_Filter_Config
    "ssm-maint-windows",     # SSM_Maintenance_Window
    "ssm-instances",         # SSM_ManagedInstances
    "ssm-patch-detail",      # SSM_Patch_Compliance_Detail
    "ssm-patch-exec",        # SSM_Patch_Execution
    "ssm-patch-summary",     # SSM_Patch_Summary
    "ssm-patches",           # SSM_PatchCompliance
    "time-sync",             # Time_Sync_Config
    "backup",                # AWS_Backup_job_history_exports
    "cloudtrail",            # CloudTrail_backup_and_snapshot_events
]


